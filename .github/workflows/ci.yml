name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Type check with mypy
        continue-on-error: true
        run: mypy plugins/

      - name: Run tests with coverage
        run: pytest --cov=plugins --cov-report=xml -x

      - name: Validate SKILL.md files are under 500 lines
        run: |
          failed=0
          for f in $(find . -name "SKILL.md"); do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "FAIL: $f has $lines lines (max 500)"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "All SKILL.md files are under 500 lines"

      - name: Validate marketplace.json is valid JSON
        run: python -m json.tool .claude-plugin/marketplace.json > /dev/null

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
